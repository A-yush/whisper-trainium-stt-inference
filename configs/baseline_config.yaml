# Baseline configuration for Whisper on Trainium1
# Use this for standard deployment with balanced performance

model:
  # Model paths
  base_path: "models/whisper-hindi2hinglish-swift"
  compiled_path: "models/whisper-hindi2hinglish-swift-compiled-tp2"

  # Model parameters
  language: "hi"  # Hindi input → Hinglish output
  task: "transcribe"  # transcribe or translate

neuron:
  # Hardware configuration
  tp_degree: 2  # Tensor parallelism (2 for trn1.2xlarge)
  batch_size: 1  # Optimal for latency

  # Precision
  torch_dtype: "float16"  # FP16 for speed/accuracy balance

  # Optimizations (baseline)
  async_mode: false  # Disable async for baseline
  k_cache_transposed: false  # Disable KV cache optimization

compilation:
  # Compiler settings
  cache_dir: "/tmp/neuron_cache"

  # Optimization flags (conservative)
  enable_fast_math: false
  enable_saturate_infinity: false

  # Warmup
  warmup_iterations: 2

inference:
  # Audio preprocessing
  sample_rate: 16000  # Whisper requirement
  mono: true  # Convert stereo to mono

  # Output
  verbose: false  # Disable progress bars

service:
  # Service configuration
  max_workers: 1  # Single worker for single instance

  # Monitoring
  enable_metrics: true
  log_level: "INFO"

  # Timeouts (seconds)
  initialization_timeout: 60
  transcription_timeout: 300

  # Health check
  health_check_interval: 30

# Performance targets (baseline)
performance:
  target_rtf: 0.015  # Target Real-Time Factor
  target_p90_latency: 1.5  # P90 latency in seconds
  target_throughput: 1.8  # Requests per second
